; Bootstrap.ini — connexion WinPE au Deployment Share MDT — eCollege19 / MARBOT
; Copier dans : <DeploymentShare>\Control\Bootstrap.ini
; ⚠️ NE PAS committer les identifiants réels : renseigner UserPassword dans une copie locale
;    (gitignorée) ou laisser vide pour saisie au démarrage de WinPE. Voir mdt/README.md.
; Toute modif de Bootstrap.ini nécessite de RÉGÉNÉRER l'image de boot (Update Deployment Share)
; puis de la RÉIMPORTER dans WDS.

[Settings]
Priority=Default

[Default]
DeployRoot=\\stats\DeploymentShare$
UserID=<COMPTE_ACCES_PARTAGE>
UserDomain=ecollege19.lan
UserPassword=                     ; VIDE ici -> saisie au démarrage WinPE (ou copie locale hors dépôt)
SkipBDDWelcome=YES
