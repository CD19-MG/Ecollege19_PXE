; CustomSettings.ini — automatisation de la séquence MDT (LiteTouch) — eCollege19 / MARBOT
; Copier dans le Deployment Share : <DeploymentShare>\Control\CustomSettings.ini
; ⚠️ NE PAS committer les identifiants réels : renseigner DomainAdminPassword dans une copie
;    locale (gitignorée) ou laisser vide pour saisie à l'exécution. Voir mdt/README.md.

[Settings]
Priority=Default

[Default]
_SMSTSOrgName=eCollege19 - DSIUN Corrèze
OSInstall=Y

; --- Jonction de domaine ---
JoinDomain=ecollege19.lan
DomainAdmin=<COMPTE_DE_JONCTION>            ; compte dédié avec droit de joindre au domaine
DomainAdminDomain=ecollege19.lan
DomainAdminPassword=                        ; VIDE ici -> saisie à l'exécution (ou copie locale hors dépôt)
; MachineObjectOU=OU=Ordinateurs,OU=<college>,DC=ecollege19,DC=lan   ; décommenter/adapter si OU cible

; --- Localisation ---
TimeZoneName=Romance Standard Time
KeyboardLocale=fr-FR
UserLocale=fr-FR
UILanguage=fr-FR

; --- Pages de l'assistant à sauter (déploiement rapide) ---
SkipCapture=YES
SkipProductKey=YES
SkipTimeZone=YES
SkipLocaleSelection=YES
SkipDomainMembership=YES
SkipUserData=YES
SkipAppsOnUpgrade=YES
SkipSummary=YES
SkipFinalSummary=YES
SkipRoles=YES
SkipBitLocker=YES

; --- Nommage : on laisse saisir le nom (SkipComputerName=NO) ; sinon auto (ex. via numéro de série)
SkipComputerName=NO
; OSDComputerName=%SerialNumber%           ; alternative : nommage auto par n° de série

FinishAction=REBOOT
