; winpeshl.ini - a placer dans le WinPE : \Windows\System32\winpeshl.ini
; Remplace le shell par defaut (cmd) : initialise le reseau (wpeinit) puis lance deploy.ps1.
; Necessite PowerShell dans le WinPE (ajouter les composants WinPE-PowerShell & dependances).
[LaunchApps]
"%SYSTEMDRIVE%\Windows\System32\wpeinit.exe"
"%SYSTEMDRIVE%\Windows\System32\WindowsPowerShell\v1.0\powershell.exe", "-NoProfile -ExecutionPolicy Bypass -File %SYSTEMDRIVE%\deploy.ps1"
