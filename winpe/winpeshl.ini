; winpeshl.ini - a placer dans le WinPE : \Windows\System32\winpeshl.ini
; Initialise le reseau (wpeinit) puis lance bootstrap.ps1 (qui monte le partage et lance deploy.ps1).
; Necessite PowerShell dans le WinPE (composants WinPE-PowerShell & dependances).
[LaunchApps]
"%SYSTEMDRIVE%\Windows\System32\wpeinit.exe"
"%SYSTEMDRIVE%\Windows\System32\WindowsPowerShell\v1.0\powershell.exe", "-NoProfile -ExecutionPolicy Bypass -Command try { & '%SYSTEMDRIVE%\bootstrap.ps1' } catch { Write-Host $_.Exception.Message -ForegroundColor Red } finally { Read-Host 'FIN - tape Entree pour redemarrer' }"
